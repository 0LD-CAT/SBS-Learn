version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  piston:
    image: ghcr.io/engineer-man/piston
    privileged: true
    restart: unless-stopped
    volumes:
      - ./piston_data:/piston
    ports:
      - "2000:2000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:2000/api/v2/runtimes" ]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.prod
    command: alembic -c /app/alembic.ini upgrade head
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.prod
    command: python -m backend.lessons.init_db
    depends_on:
      migrate:
        condition: service_completed_successfully

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    depends_on:
      - db
      - piston
      - migrate
      - seed

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: