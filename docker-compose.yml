version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "pip install -r backend/config/requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - PISTON_URL=http://piston:2000
      - PYTHONPATH=/app
    depends_on:
      - piston

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston
    privileged: true
    volumes:
      - ./piston_data:/piston
    ports:
      - "2000:2000"